<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <!-- Khai bao namespace de dung th:*-->
  <head>
    <meta charset="UTF-8" />
    <title>Danh Sach Sinh Vien</title>
    <!-- CSS don gian-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container mt-5">

      <div class="d-flex justify-content-between align-items-center mb-4">

        <!-- Form tìm kiếm -->
        <form action="/students" method="get" class="d-flex" role="search">
          <input
            type="text"
            name="keyword"
            class="form-control me-2"
            placeholder="Nhập tên sinh viên..."
            th:value="${keyword}"
          />
          <button type="submit" class="btn btn-primary">Tìm</button>
        </form>

        <!-- Nút thêm mới -->
        <a href="/students/new" class="btn btn-success">
          + Thêm mới
        </a>

      </div>

      <h2 class="mb-3">Danh Sách Sinh Viên (SSR)</h2>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Họ và Tên</th>
                <th>Email</th>
                <th>Tuổi</th>
                <th>Chi tiết</th>
              </tr>
            </thead>
            <tbody>
              <tr
                th:each="student : ${dsSinhVien}"
                th:classappend="${student.age < 18} ? 'table-danger' : ''"
              >
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.age}"></td>
                <td>
                  <a th:href="@{'/students/' + ${student.id}}"
                    class="btn btn-sm btn-outline-primary">
                    Xem
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
